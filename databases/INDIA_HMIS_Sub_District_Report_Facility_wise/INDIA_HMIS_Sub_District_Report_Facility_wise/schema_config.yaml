  FACT_OUTPATIENT_SERVICES: General outpatient healthcare services
  FACT_CHILD_IMMUNIZATION_ROUTINE: Routine child vaccination doses
  FACT_CHILD_IMMUNIZATION_SPECIALIZED: Specialized vaccines and booster doses
  FACT_CHILD_IMMUNIZATION_COVERAGE: Immunization coverage and completion metrics

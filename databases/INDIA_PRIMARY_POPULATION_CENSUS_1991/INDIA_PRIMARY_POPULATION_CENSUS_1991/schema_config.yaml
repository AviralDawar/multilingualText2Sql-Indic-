table_descriptions:
  DIM_GEOGRAPHY_HIERARCHY: Master table for all location hierarchy data, normalized
    to avoid redundancy.
  FACT_HOUSING: Housing and household statistics.
  FACT_POPULATION_CORE: Core population counts (Total, Male, Female).
  FACT_POPULATION_AGE_COHORT: Population breakdown by key age groups (starting with
    0-6).
  FACT_POPULATION_SOCIAL_CATEGORY: Population categorized as Scheduled Caste or Scheduled
    Tribe.
  FACT_POPULATION_LITERACY: Counts of illiterate population.
  FACT_WORKFORCE_STATUS: Broad categorization of population as Working or Non-Working.
  FACT_WORKFORCE_DETAIL: Detailed breakdown of working population by participation
    type (Main, Marginal, Non-Worker).
  FACT_WORKERS_PRIMARY_SECTOR: Main workers engaged in agriculture, livestock, forestry,
    fishing, mining, and quarrying (Primary Sector).
  FACT_WORKERS_SECONDARY_SECTOR: Main workers in manufacturing and construction (Secondary
    Sector).
  FACT_WORKERS_TERTIARY_SECTOR: Main workers in trade/commerce, transport/storage/communication,
    and other services (Tertiary Sector).

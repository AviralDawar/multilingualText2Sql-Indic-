table_descriptions:
  DIM_COUNTRY: Country reference data
  DIM_STATE: State reference data within countries
  DIM_DISTRICT: District reference data within states
  DIM_LOCATION: Sub-district and village level geographic data
  DIM_TIME: Census year dimension
  DIM_SECTOR_CATEGORY: Rural/Urban classification dimension
  FACT_ESTABLISHMENT_TOTALS: Core establishment counts including mixed-use categories
  FACT_PRIMARY_SECTOR: Agriculture, forestry, fishing, and mining establishments
  FACT_SECONDARY_SECTOR: Manufacturing, utilities, and construction establishments
  FACT_TRADE_SECTOR: Wholesale, retail, and automotive trade establishments
  FACT_TRANSPORT_HOSPITALITY: Transportation, storage, and accommodation/food service
    establishments
  FACT_TECHNOLOGY_FINANCE: ICT and financial services establishments
  FACT_EDUCATION_HEALTH: Education and healthcare establishments
  FACT_OWNERSHIP_TYPE: Legal constitution of establishments
  FACT_GENDER_OWNERSHIP: Gender of establishment owners
  FACT_SOCIAL_GROUP_OWNERSHIP: Social group of establishment owners
  FACT_RELIGIOUS_OWNERSHIP: Religious affiliation of establishment owners
  FACT_OPERATIONS: Nature of business operations
  FACT_FINANCE_SOURCES: Primary sources of business financing

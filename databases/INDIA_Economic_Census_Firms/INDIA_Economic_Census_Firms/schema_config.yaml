database_name: INDIA_Economic_Census_Firms
source_file: total_data.csv
dimension_tables:
  DIM_COUNTRY:
    key_column: COUNTRY_ID
    dedup_columns:
    - 0
    columns:
    - source_index: 0
      target_name: COUNTRY_NAME
  DIM_STATE:
    key_column: STATE_ID
    dedup_columns:
    - 1
    columns:
    - source_index: 1
      target_name: STATE_NAME
    foreign_keys:
    - column: COUNTRY_ID
      references: DIM_COUNTRY
  DIM_DISTRICT:
    key_column: DISTRICT_ID
    dedup_columns:
    - 2
    columns:
    - source_index: 2
      target_name: DISTRICT_NAME
    foreign_keys:
    - column: STATE_ID
      references: DIM_STATE
  DIM_LOCATION:
    key_column: LOCATION_ID
    dedup_columns:
    - 3
    - 4
    columns:
    - source_index: 3
      target_name: SUB_DISTRICT_NAME
    - source_index: 4
      target_name: ULB_RLB_VILLAGE_NAME
    foreign_keys:
    - column: DISTRICT_ID
      references: DIM_DISTRICT
  DIM_TIME:
    key_column: TIME_ID
    dedup_columns:
    - 5
    columns:
    - source_index: 5
      target_name: CENSUS_YEAR
      transform: extract_year
  DIM_SECTOR_CATEGORY:
    key_column: SECTOR_ID
    dedup_columns:
    - 6
    columns:
    - source_index: 6
      target_name: SECTOR_CATEGORY
fact_tables:
  FACT_ESTABLISHMENT_TOTALS:
    key_column: FACT_ESTABLISHMENT_TOTALS_ID
    foreign_keys:
    - column: LOCATION_ID
      references: DIM_LOCATION
    - column: TIME_ID
      references: DIM_TIME
    - column: SECTOR_ID
      references: DIM_SECTOR_CATEGORY
    columns:
    - source_index: 67
      target_name: TOTAL_ESTABLISHMENTS
    - source_index: 7
      target_name: EST_RESIDENTIAL_COMMERCIAL
  FACT_PRIMARY_SECTOR:
    key_column: FACT_PRIMARY_SECTOR_ID
    foreign_keys:
    - column: LOCATION_ID
      references: DIM_LOCATION
    - column: TIME_ID
      references: DIM_TIME
    - column: SECTOR_ID

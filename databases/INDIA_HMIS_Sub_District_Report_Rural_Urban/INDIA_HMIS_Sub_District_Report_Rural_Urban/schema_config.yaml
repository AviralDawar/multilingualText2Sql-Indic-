table_descriptions:
  DIM_COUNTRY: Top-level geographic dimension
  DIM_STATE: State-level geographic dimension
  DIM_DISTRICT: District-level geographic dimension
  DIM_SUB_DISTRICT: Sub-district-level geographic dimension
  DIM_YEAR: Year dimension
  DIM_MONTH: Month dimension with year context
  FACT_OUTPATIENT_SERVICES: Track outpatient healthcare attendance
  FACT_CHILD_IMMUNIZATION_ROUTINE: Track basic routine childhood immunizations
  FACT_CHILD_IMMUNIZATION_SPECIALIZED: Track specialized childhood immunizations
  FACT_CHILD_IMMUNIZATION_BOOSTERS: Track vaccine boosters and follow-up doses
  FACT_CHILD_IMMUNIZATION_ADOLESCENT: Track immunizations for older children and adolescents
  FACT_IMMUNIZATION_COVERAGE: Track immunization coverage metrics
  FACT_MATERNAL_ANC_REGISTRATION: Track antenatal care registration and basic metrics
  FACT_MATERNAL_VACCINES_MEDICATIONS: Track maternal vaccines and medications
  FACT_MATERNAL_HEALTH_TESTING: Track maternal health testing and hemoglobin monitoring
  FACT_IMMUNIZATION_SESSIONS: Track immunization session planning and execution
  FACT_FAMILY_PLANNING: Track family planning service delivery
  FACT_PREGNANCY_TESTING: Track pregnancy testing services

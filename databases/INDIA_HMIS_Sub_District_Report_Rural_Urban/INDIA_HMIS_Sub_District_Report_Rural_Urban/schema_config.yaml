database_name: INDIA_HMIS_Sub_District_Report_Rural_Urban
source_file: total_data.csv
dimension_tables:
  DIM_COUNTRY:
    key_column: COUNTRY_ID
    dedup_columns:
    - 0
    columns:
    - source_index: 0
      target_name: COUNTRY_NAME
  DIM_STATE:
    key_column: STATE_ID
    dedup_columns:
    - 1
    columns:
    - source_index: 1
      target_name: STATE_NAME
    foreign_keys:
    - column: COUNTRY_ID
      references: DIM_COUNTRY
  DIM_DISTRICT:
    key_column: DISTRICT_ID
    dedup_columns:
    - 2
    columns:
    - source_index: 2
      target_name: DISTRICT_NAME
    foreign_keys:
    - column: STATE_ID
      references: DIM_STATE
  DIM_SUB_DISTRICT:
    key_column: SUB_DISTRICT_ID
    dedup_columns:
    - 3
    - 6
    columns:
    - source_index: 3
      target_name: SUB_DISTRICT_NAME
    - source_index: 6
      target_name: TYPE_OF_AREA
    foreign_keys:
    - column: DISTRICT_ID
      references: DIM_DISTRICT
  DIM_YEAR:
    key_column: YEAR_ID
    dedup_columns:
    - 4
    columns:
    - source_index: 4
      target_name: YEAR_VALUE
  DIM_MONTH:
    key_column: MONTH_ID
    dedup_columns:
    - 5
    - 5
    columns:
    - source_index: 5
      target_name: MONTH_VALUE
    - source_index: 5
      target_name: MONTH_NAME
    foreign_keys:
    - column: YEAR_ID
      references: DIM_YEAR

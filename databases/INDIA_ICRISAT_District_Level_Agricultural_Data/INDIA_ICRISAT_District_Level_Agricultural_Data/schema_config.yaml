table_descriptions:
  DIM_GEOGRAPHY: Geographic hierarchy for states and districts
  DIM_YEAR: Time dimension for agricultural years
  FACT_CEREALS_MAJOR: Production metrics for major cereal crops
  FACT_CEREALS_MINOR: Production metrics for minor cereal crops
  FACT_MILLETS: Production metrics for millet crops
  FACT_SORGHUM: Production metrics for sorghum crops by season
  FACT_PULSES_MAJOR: Production metrics for major pulse crops
  FACT_PULSES_MINOR: Production metrics for minor/aggregated pulses
  FACT_OILSEEDS_MAJOR: Production metrics for major oilseed crops
  FACT_OILSEEDS_MINOR: Production metrics for minor oilseed crops
  FACT_OILSEEDS_SUNFLOWER: Production metrics for sunflower oilseed crop
  FACT_COMMERCIAL_CROPS: Production metrics for commercial/fiber crops

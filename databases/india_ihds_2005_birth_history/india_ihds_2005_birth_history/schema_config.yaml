database_name: india_ihds_2005_birth_history
source_file: total_data.csv
dimension_tables:
  DIM_STATE:
    key_column: STATE_ID
    dedup_columns:
    - 0
    columns:
    - source_index: 0
      target_name: STATE_NAME
  DIM_DISTRICT:
    key_column: DISTRICT_ID
    dedup_columns:
    - 1
    columns:
    - source_index: 1
      target_name: DISTRICT_NAME
    foreign_keys:
    - column: STATE_ID
      references: DIM_STATE
  DIM_PSU_VILLAGE:
    key_column: PSU_VILLAGE_ID
    dedup_columns:
    - 2
    columns:
    - source_index: 2
      target_name: PSU_VILLAGE_CODE
    foreign_keys:
    - column: DISTRICT_ID
      references: DIM_DISTRICT
  DIM_HOUSEHOLD:
    key_column: HOUSEHOLD_ID
    dedup_columns:
    - 3
    - 4
    columns:
    - source_index: 3
      target_name: HOUSEHOLD_ID_ORIGINAL
    - source_index: 4
      target_name: SPLIT_HOUSEHOLD_ID
    foreign_keys:
    - column: PSU_VILLAGE_ID
      references: DIM_PSU_VILLAGE
  DIM_MOTHER_DEMOGRAPHICS:
    key_column: MOTHER_ID
    dedup_columns:
    - 17
    - 18
    - 19
    columns:
    - source_index: 17
      target_name: MOTHER_DATE_OF_BIRTH_IMPUTED_CMC
    - source_index: 18
      target_name: MOTHER_DATE_OF_BIRTH_FLAG
    - source_index: 19
      target_name: MOTHER_AGE_IMPUTED
  DIM_MOTHER_MARRIAGE_EVENTS:
    key_column: MOTHER_MARRIAGE_ID
    dedup_columns:
    - 20
    - 21
    - 22
    - 26
    - 27
    - 28
    columns:
    - source_index: 20
      target_name: DATE_OF_MARRIAGE_IMPUTED_CMC
    - source_index: 21
      target_name: DATE_OF_MARRIAGE_FLAG
    - source_index: 22
      target_name: AGE_AT_MARRIAGE_IMPUTED
    - source_index: 26
      target_name: DATE_OF_FIRST_MARRIAGE_IMPUTED_CMC
    - source_index: 27
      target_name: DATE_OF_FIRST_MARRIAGE_FLAG
    - source_index: 28
      target_name: AGE_AT_FIRST_MARRIAGE_IMPUTED
    foreign_keys:
    - column: MOTHER_ID
      references: DIM_MOTHER_DEMOGRAPHICS
  DIM_MOTHER_GAUNA_EVENTS:
    key_column: MOTHER_GAUNA_ID
    dedup_columns:
    - 23
    - 24
    - 25
    - 29
    - 30
    - 31
    columns:
    - source_index: 23
      target_name: DATE_OF_GAUNA_IMPUTED_CMC
    - source_index: 24
      target_name: DATE_OF_GAUNA_FLAG
    - source_index: 25
      target_name: AGE_AT_GAUNA_IMPUTED
    - source_index: 29
      target_name: DATE_OF_FIRST_GAUNA_IMPUTED_CMC
    - source_index: 30
      target_name: DATE_OF_FIRST_GAUNA_FLAG
    - source_index: 31
      target_name: AGE_AT_FIRST_GAUNA_IMPUTED
    foreign_keys:
    - column: MOTHER_ID
      references: DIM_MOTHER_DEMOGRAPHICS
  DIM_CHILD_DEMOGRAPHICS:
    key_column: CHILD_ID
    dedup_columns:
    - 6
    - 12
    - 13
    - 14
    - 15
    - 9
    columns:
    - source_index: 6
      target_name: CHILD_SEX
    - source_index: 12
      target_name: CHILD_DATE_OF_BIRTH_IMPUTED_CMC
    - source_index: 13
      target_name: CHILD_DATE_OF_BIRTH_FLAG
    - source_index: 14
      target_name: CHILD_AGE_AT_DEATH_IMPUTED
    - source_index: 15
      target_name: CHILD_AGE_AT_DEATH_FLAG
    - source_index: 9
      target_name: CHILD_LIVING_STATUS
  DIM_SURVEY:
    key_column: SURVEY_ID
    dedup_columns:
    - 16
    columns:
    - source_index: 16
      target_name: INTERVIEW_DATE_IMPUTED_CMC
fact_tables:
  FACT_BIRTH_EVENT:
    key_column: BIRTH_EVENT_ID
    foreign_keys:
    - column: CHILD_ID
      references: DIM_CHILD_DEMOGRAPHICS
    - column: MOTHER_ID
      references: DIM_MOTHER_DEMOGRAPHICS
    - column: HOUSEHOLD_ID
      references: DIM_HOUSEHOLD
    - column: SURVEY_ID
      references: DIM_SURVEY
    columns:
    - source_index: 5
      target_name: BIRTH_ID
table_descriptions:
  DIM_STATE: State-level geographic dimension
  DIM_DISTRICT: District-level geographic dimension
  DIM_PSU_VILLAGE: Primary Sampling Unit/Village-level geographic dimension
  DIM_HOUSEHOLD: Household identification and structure
  DIM_MOTHER_DEMOGRAPHICS: Mother's birth and age information
  DIM_MOTHER_MARRIAGE_EVENTS: Mother's marriage events (current and first)
  DIM_MOTHER_GAUNA_EVENTS: Mother's gauna (cohabitation) events (current and first)
  DIM_CHILD_DEMOGRAPHICS: Child's demographic and vital status information
  DIM_SURVEY: Survey interview metadata
  FACT_BIRTH_EVENT: Core birth event fact table linking all dimensions

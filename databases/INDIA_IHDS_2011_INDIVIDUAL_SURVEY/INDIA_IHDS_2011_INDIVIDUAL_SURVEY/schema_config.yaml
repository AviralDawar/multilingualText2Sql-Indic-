table_descriptions:
  DIM_GEOGRAPHY: Geographic hierarchy and location identifiers
  DIM_HOUSEHOLD: Household identification and structure
  DIM_PERSON: Individual person identification
  DIM_STATISTICAL_WEIGHTS: Statistical weighting factors for survey data
  FACT_EDUCATION_EXPENDITURE: Education-related costs at individual level
  FACT_HEALTH_EXPENDITURE: Healthcare costs and insurance coverage
  FACT_HOUSEHOLD_CONSUMPTION: Household consumption and expenditure metrics
  FACT_AGRICULTURAL_INCOME: Income from agricultural activities
  FACT_BUSINESS_INCOME: Income from business operations
  FACT_PROPERTY_PENSION_INCOME: Income from property, pensions, and passive sources
  FACT_HOUSEHOLD_TRANSFERS: Government benefits, remittances, and transfers
  FACT_HOUSEHOLD_WAGE_INCOME: Household-level wage and salary earnings
  FACT_HOUSEHOLD_INCOME_SUMMARY: Aggregated household income metrics
  FACT_INDIVIDUAL_WAGE_EARNINGS: Individual wage and salary components
  FACT_INDIVIDUAL_OCCUPATION_EARNINGS: Earnings by occupation type
  FACT_INDIVIDUAL_INCOME_COMPONENTS: Detailed income components at individual level

database_name: INDIA_IHDS_2011_INDIVIDUAL_SURVEY
source_file: total_data.csv
dimension_tables:
  DIM_GEOGRAPHY:
    key_column: UNIQUE_PSU_ID_CLUSTER
    dedup_columns:
    - 0
    - 1
    - 2
    columns:
    - source_index: 0
      target_name: STATE
    - source_index: 1
      target_name: DISTRICT
    - source_index: 2
      target_name: PSU_VILLAGE_OR_NEIGHBORHOOD_CODE
  DIM_HOUSEHOLD:
    key_column: UNIQUE_HOUSEHOLD_ID
    dedup_columns:
    - 3
    - 4
    - 5
    columns:
    - source_index: 3
      target_name: HOUSEHOLD_ID_3_DIGIT
    - source_index: 4
      target_name: SPLIT_HOUSEHOLD_ID
    - source_index: 5
      target_name: ROSTER_ID_WITHIN_2012_HOUSEHOLD
    foreign_keys:
    - column: UNIQUE_PSU_ID_CLUSTER
      references: DIM_GEOGRAPHY
  DIM_PERSON:
    key_column: UNIQUE_PERSON_ID
    dedup_columns: []
    columns: []
    foreign_keys:
    - column: UNIQUE_HOUSEHOLD_ID
      references: DIM_HOUSEHOLD
  DIM_STATISTICAL_WEIGHTS:
    key_column: WEIGHT_ID
    dedup_columns:
    - 9
    - 10
    columns:
    - source_index: 9
      target_name: PERSON_WEIGHT_2012
    - source_index: 10
      target_name: INTEGER_PERSON_WEIGHT_2012
    foreign_keys:
    - column: UNIQUE_PERSON_ID
      references: DIM_PERSON
fact_tables:
  FACT_EDUCATION_EXPENDITURE:

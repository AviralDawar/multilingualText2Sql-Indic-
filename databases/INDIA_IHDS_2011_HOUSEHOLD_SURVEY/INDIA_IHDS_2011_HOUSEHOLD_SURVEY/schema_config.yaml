table_descriptions:
  DIM_GEOGRAPHY: Geographic and household identification data
  FACT_BUSINESS_TYPE_A: Detailed business operations with complete expense breakdown
    (Business 1)
  FACT_BUSINESS_TYPE_B: Simplified business operations without rent or other costs
    (Business 2)
  FACT_BUSINESS_TYPE_C: Business operations with rent expenses (Business 3)
  FACT_AGRICULTURE_OPERATIONS: Agricultural operational income and expenses
  FACT_HOUSEHOLD_CONSUMPTION_DEBT: Household consumption, debt, and credit metrics
  FACT_CEREMONIAL_EXPENSES: Wedding and ceremonial expense ranges
  FACT_WAGE_REMITTANCE_INCOME: Wage, salary, and remittance income streams
  FACT_CAPITAL_TRANSACTIONS: Income from sale of land assets

database_name: INDIA_ROAD_ACCIDENTS_DATASET_2001
source_file: total_data.csv
dimension_tables:
  DIM_TIME:
    key_column: TIME_ID
    dedup_columns:
    - 0
    - 1
    columns:
    - source_index: 0
      target_name: TIME
    - source_index: 1
      target_name: DAY_OF_WEEK
  DIM_DRIVER:
    key_column: DRIVER_ID
    dedup_columns:
    - 2
    - 3
    - 4
    - 5
    - 6
    columns:
    - source_index: 2
      target_name: AGE_BAND_OF_DRIVER
    - source_index: 3
      target_name: SEX_OF_DRIVER
    - source_index: 4
      target_name: EDUCATIONAL_LEVEL
    - source_index: 5
      target_name: VEHICLE_DRIVER_RELATION
    - source_index: 6
      target_name: DRIVING_EXPERIENCE
  DIM_CASUALTY:
    key_column: CASUALTY_ID
    dedup_columns:
    - 23
    - 24
    - 25
    - 27
    - 28
    columns:
    - source_index: 23
      target_name: CASUALTY_CLASS
    - source_index: 24
      target_name: SEX_OF_CASUALTY
    - source_index: 25
      target_name: AGE_BAND_OF_CASUALTY
    - source_index: 27
      target_name: WORK_OF_CASUALTY
    - source_index: 28
      target_name: FITNESS_OF_CASUALTY
  DIM_VEHICLE:
    key_column: VEHICLE_ID
    dedup_columns:
    - 7
    - 8
    - 9
    - 10
    - 22
    columns:
    - source_index: 7
      target_name: TYPE_OF_VEHICLE
    - source_index: 8
      target_name: OWNER_OF_VEHICLE
    - source_index: 9
      target_name: SERVICE_YEAR_OF_VEHICLE
    - source_index: 10
      target_name: DEFECT_OF_VEHICLE
    - source_index: 22
      target_name: VEHICLE_MOVEMENT
  DIM_GEOGRAPHY:
    key_column: GEOGRAPHY_ID
    dedup_columns:
    - 11
    columns:
    - source_index: 11
      target_name: AREA_ACCIDENT_OCCURRED
  DIM_ROAD_CHARACTERISTICS:
    key_column: ROAD_CHAR_ID
    dedup_columns:
    - 12
    - 13
    - 14
    - 15
    - 16
    columns:
    - source_index: 12
      target_name: LANES_OR_MEDIANS
    - source_index: 13
      target_name: ROAD_ALIGNMENT
    - source_index: 14
      target_name: TYPES_OF_JUNCTION
    - source_index: 15
      target_name: ROAD_SURFACE_TYPE
    - source_index: 16
      target_name: ROAD_SURFACE_CONDITIONS
  DIM_ENVIRONMENT:
    key_column: ENVIRONMENT_ID
    dedup_columns:
    - 17
    - 18
    columns:
    - source_index: 17
      target_name: LIGHT_CONDITIONS
    - source_index: 18
      target_name: WEATHER_CONDITIONS
  DIM_ACCIDENT_EVENT:
    key_column: ACCIDENT_EVENT_ID
    dedup_columns:
    - 19
    - 29
    - 30
    columns:
    - source_index: 19
      target_name: TYPE_OF_COLLISION
    - source_index: 29
      target_name: PEDESTRIAN_MOVEMENT
    - source_index: 30
      target_name: CAUSE_OF_ACCIDENT
fact_tables:
  FACT_ACCIDENT:
    key_column: ACCIDENT_ID
    foreign_keys:
    - column: TIME_ID
      references: DIM_TIME
    - column: DRIVER_ID
      references: DIM_DRIVER
    - column: VEHICLE_ID
      references: DIM_VEHICLE
    - column: GEOGRAPHY_ID
      references: DIM_GEOGRAPHY
    - column: ROAD_CHAR_ID
      references: DIM_ROAD_CHARACTERISTICS
    - column: ENVIRONMENT_ID
      references: DIM_ENVIRONMENT
    - column: ACCIDENT_EVENT_ID
      references: DIM_ACCIDENT_EVENT
    columns:
    - source_index: 20
      target_name: NUMBER_OF_VEHICLES_INVOLVED
    - source_index: 21
      target_name: NUMBER_OF_CASUALTIES
    - source_index: 31
      target_name: ACCIDENT_SEVERITY
  BRIDGE_ACCIDENT_CASUALTY:
    key_column: BRIDGE_ACCIDENT_CASUALTY_ID
    foreign_keys:
    - column: ACCIDENT_ID
      references: FACT_ACCIDENT
    - column: CASUALTY_ID
      references: DIM_CASUALTY
    columns:
    - source_index: 26
      target_name: CASUALTY_SEVERITY
table_descriptions:
  DIM_TIME: Temporal attributes of accidents
  DIM_DRIVER: Driver demographic and experience information
  DIM_CASUALTY: Casualty demographic and personal information
  DIM_VEHICLE: Vehicle characteristics and condition
  DIM_GEOGRAPHY: Geographic location of accidents
  DIM_ROAD_CHARACTERISTICS: Physical road infrastructure and conditions
  DIM_ENVIRONMENT: Ambient environmental conditions
  DIM_ACCIDENT_EVENT: Qualitative accident event characteristics
  FACT_ACCIDENT: Core accident metrics and quantitative measures
  BRIDGE_ACCIDENT_CASUALTY: Many-to-many relationship between accidents and casualties

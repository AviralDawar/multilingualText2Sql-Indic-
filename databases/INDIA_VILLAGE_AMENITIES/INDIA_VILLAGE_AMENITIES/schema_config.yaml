database_name: INDIA_VILLAGE_AMENITIES
source_file: total_data.csv
dimension_tables:
  DIM_COUNTRY:
    key_column: COUNTRY_ID
    dedup_columns:
    - 0
    columns:
    - source_index: 0
      target_name: COUNTRY_NAME
  DIM_STATE:
    key_column: STATE_ID
    dedup_columns:
    - 1
    columns:
    - source_index: 1
      target_name: STATE_NAME
    foreign_keys:
    - column: COUNTRY_ID
      references: DIM_COUNTRY
  DIM_DISTRICT:
    key_column: DISTRICT_ID
    dedup_columns:
    - 2
    columns:
    - source_index: 2
      target_name: DISTRICT_NAME
    foreign_keys:
    - column: STATE_ID
      references: DIM_STATE
  DIM_GEOGRAPHY:
    key_column: GEOGRAPHY_ID
    dedup_columns:
    - 3
    - 4
    columns:
    - source_index: 3
      target_name: SUB_DISTRICT
    - source_index: 4
      target_name: ULB_RLB_VILLAGE
    foreign_keys:
    - column: DISTRICT_ID
      references: DIM_DISTRICT
  DIM_TIME:
    key_column: TIME_ID
    dedup_columns: []
    columns:
    - target_name: RECORD_DATE
    - target_name: YEAR
    - target_name: QUARTER
    - target_name: MONTH
fact_tables:
  FACT_VILLAGE_DEMOGRAPHICS:
    key_column: DEMOGRAPHICS_ID
    foreign_keys:
    - column: GEOGRAPHY_ID
      references: DIM_GEOGRAPHY
    - column: TIME_ID
      references: DIM_TIME
    columns:
    - source_index: 49
      target_name: RURAL_POPULATION
  FACT_TRANSPORTATION_ACCESSIBILITY:
    key_column: TRANSPORTATION_ID
    foreign_keys:
    - column: GEOGRAPHY_ID
      references: DIM_GEOGRAPHY
    columns:
    - source_index: 5
      target_name: DISTANCE_TO_PRIVATE_COURIER_FACILITY
    - source_index: 6
      target_name: DISTANCE_TO_PUBLIC_BUS_SERVICE
    - source_index: 7
      target_name: DISTANCE_TO_PRIVATE_BUS_SERVICE
    - source_index: 8
      target_name: DISTANCE_TO_RAILWAY_STATION
    - source_index: 9
      target_name: DISTANCE_TO_AUTO_MODIFIED_AUTOS
    - source_index: 10
      target_name: DISTANCE_TO_TAXI
    - source_index: 11
      target_name: DISTANCE_TO_VANS
    - source_index: 12
      target_name: DISTANCE_TO_TRACTORS
    - source_index: 13
      target_name: DISTANCE_TO_CYCLE_RICKSHAW_MANUAL
    - source_index: 14
      target_name: DISTANCE_TO_CYCLE_RICKSHAW_MACHINE
    - source_index: 15
      target_name: DISTANCE_TO_ANIMAL_CARTS
    - source_index: 16
      target_name: DISTANCE_TO_SEA_RIVER_FERRY
  FACT_ROAD_HIERARCHY_ACCESSIBILITY:
    key_column: ROAD_HIERARCHY_ID
    foreign_keys:
    - column: GEOGRAPHY_ID
      references: DIM_GEOGRAPHY
    columns:
    - source_index: 17
      target_name: DISTANCE_TO_NATIONAL_HIGHWAY
    - source_index: 18
      target_name: DISTANCE_TO_STATE_HIGHWAY
    - source_index: 19
      target_name: DISTANCE_TO_MAJOR_DISTRICT_ROAD
    - source_index: 20
      target_name: DISTANCE_TO_OTHER_DISTRICT_ROAD
  FACT_ROAD_SURFACE_ACCESSIBILITY:
    key_column: ROAD_SURFACE_ID
    foreign_keys:

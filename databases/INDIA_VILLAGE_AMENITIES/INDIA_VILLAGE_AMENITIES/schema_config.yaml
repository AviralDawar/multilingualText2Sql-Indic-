table_descriptions:
  DIM_COUNTRY: Country-level geographic dimension
  DIM_STATE: State-level geographic dimension with country hierarchy
  DIM_DISTRICT: District-level geographic dimension with state hierarchy
  DIM_GEOGRAPHY: Village-level geographic dimension with sub-district granularity
  DIM_TIME: Temporal dimension for tracking data collection periods
  FACT_VILLAGE_DEMOGRAPHICS: Population and demographic characteristics at village
    level
  FACT_TRANSPORTATION_ACCESSIBILITY: Distance to various transportation modes and
    services
  FACT_ROAD_HIERARCHY_ACCESSIBILITY: Distance to roads classified by administrative
    hierarchy (National, State, District)
  FACT_ROAD_SURFACE_ACCESSIBILITY: Distance to roads classified by surface type and
    weather resilience
  FACT_ALTERNATIVE_TRANSPORT_ACCESSIBILITY: Distance to alternative transportation
    modes (waterways, footpaths)
  FACT_FINANCIAL_SERVICES_ACCESSIBILITY: Distance to banking and financial institutions
  FACT_MARKET_ACCESSIBILITY: Distance to market and trading facilities
  FACT_HEALTH_NUTRITION_ACCESSIBILITY: Distance to health and nutritional centers
  FACT_EDUCATION_INFORMATION_ACCESSIBILITY: Distance to education and information
    access facilities
  FACT_RECREATION_CULTURE_ACCESSIBILITY: Distance to recreation and cultural facilities
  FACT_CIVIC_SERVICES_ACCESSIBILITY: Distance to civic and administrative services

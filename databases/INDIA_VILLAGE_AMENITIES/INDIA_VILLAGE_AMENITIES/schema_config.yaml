    columns:
    - source_index: 21
      target_name: DISTANCE_TO_BLACK_TOPPED_PUCCA_ROAD
    - source_index: 22
      target_name: DISTANCE_TO_GRAVEL_KUCHHA_ROAD
    - source_index: 23

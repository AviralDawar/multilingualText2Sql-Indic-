table_descriptions:
  DIM_HOUSEHOLD: Core household entity with basic composition
  DIM_GEOGRAPHY_HIERARCHY: Pure geographic hierarchy without infrastructure
  DIM_VILLAGE_INFRASTRUCTURE: Village-level infrastructure and services
  DIM_HOUSEHOLD_SOCIAL: Social and cultural attributes of households
  DIM_HOUSEHOLD_MARITAL: Marital and union information
  DIM_EDUCATION_ADULT: Adult education and literacy metrics
  DIM_EDUCATION_CHILD: Child education metrics
  DIM_HEALTH_CHILD: Child health and immunization
  DIM_LIVELIHOOD_INCOME: Household income sources
  DIM_HOUSEHOLD_CHORES: Time allocation for basic needs collection
  FACT_HOUSEHOLD_CONSUMPTION: Core household consumption expenditure facts
  FACT_UTILITY_CONSUMPTION: Household utility expenditure
  FACT_FOOD_CONSUMPTION: Detailed food item expenditure

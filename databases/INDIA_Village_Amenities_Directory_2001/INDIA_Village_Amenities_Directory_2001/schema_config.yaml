      target_name: NUMBER_OF_PRIMARY_SCHOOLS
    - source_index: 15
      target_name: NUMBER_OF_MIDDLE_SCHOOLS
    - source_index: 16
      target_name: NUMBER_OF_SECONDARY_SCHOOLS

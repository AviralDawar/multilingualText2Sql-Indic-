database_name: INDIA_Village_Amenities_Directory _2001
source_file: total_data.csv
dimension_tables:
  DIM_COUNTRY:
    key_column: COUNTRY_ID
    dedup_columns:
    - 0
    columns:
    - source_index: 0
      target_name: COUNTRY_NAME
  DIM_STATE:
    key_column: STATE_ID
    dedup_columns:
    - 1
    columns:
    - source_index: 1
      target_name: STATE_NAME
    foreign_keys:
    - column: COUNTRY_ID
      references: DIM_COUNTRY
  DIM_DISTRICT:
    key_column: DISTRICT_ID
    dedup_columns:
    - 2
    columns:
    - source_index: 2
      target_name: DISTRICT_NAME
    foreign_keys:
    - column: STATE_ID
      references: DIM_STATE
  DIM_SUB_DISTRICT:
    key_column: SUB_DISTRICT_ID
    dedup_columns:
    - 3
    columns:
    - source_index: 3
      target_name: SUB_DISTRICT_NAME
    foreign_keys:
    - column: DISTRICT_ID
      references: DIM_DISTRICT
fact_tables:
  FACT_POPULATION:
    key_column: SUB_DISTRICT_ID
    columns:
    - source_index: 4
      target_name: NUMBER_OF_HOUSEHOLDS

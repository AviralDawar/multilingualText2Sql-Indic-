table_descriptions:
  DIM_COUNTRY: Country-level geographic dimension
  DIM_STATE: State-level geographic dimension
  DIM_DISTRICT: District-level geographic dimension
  DIM_SUB_DISTRICT: Sub-district-level geographic dimension
  FACT_POPULATION: Demographic population statistics
  FACT_EDUCATION: Educational facilities and infrastructure
  FACT_HEALTHCARE_FACILITIES: Healthcare infrastructure and medical facilities
  FACT_MATERNITY_CHILD_CARE: Maternity, child welfare, and primary healthcare centers
  FACT_MEDICAL_PERSONNEL: Healthcare workforce and medical practitioners
  FACT_COMMUNICATIONS: Postal, telegraph, and telecommunication services
  FACT_FINANCIAL_SERVICES: Banking and credit society infrastructure
  FACT_RECREATION_SPORTS: Entertainment and sports facilities
